<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX // AMBER Admin</title>
<style>
:root {
  --bg-dark: #0f172a;
  --bg-card: #1e293b;
  --accent-orange: #f97316;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --success: #22c55e;
  --danger: #ef4444;
  --border: rgba(255, 255, 255, 0.1);
  --sidebar-w: 240px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    font-family: 'Inter', system-ui, sans-serif; 
    background-color: var(--bg-dark); 
    color: var(--text-main);
    min-height: 100vh;
}

/* LOGIN SCREEN */
#login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at top right, #1e293b, #0f172a);
}
.login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    width: 100%; max-width: 380px;
    text-align: center;
}
.login-header { font-size: 1.5rem; font-weight: 800; color: var(--accent-orange); margin-bottom: 2rem; letter-spacing: 3px; }
.form-group { text-align: left; margin-bottom: 1.25rem; }
.form-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; }
.form-group input { 
    width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); 
    background: rgba(0,0,0,0.3); color: white; outline: none;
}
.btn-primary { 
    width: 100%; padding: 14px; background: var(--accent-orange); color: white; 
    border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;
}

/* APP LAYOUT */
#app { display: none; min-height: 100vh; }
.sidebar { 
    width: var(--sidebar-w); background: #070a13; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 1.5rem;
}
.sidebar-header { font-size: 1.1rem; font-weight: 800; color: var(--accent-orange); margin-bottom: 2.5rem; letter-spacing: 2px; }
.nav-item { padding: 12px 16px; border-radius: 6px; cursor: pointer; color: var(--text-muted); margin-bottom: 5px; font-size: 13px; font-weight: 500; }
.nav-item.active { background: var(--accent-orange); color: white; }

.main-content { flex: 1; padding: 2.5rem; overflow-y: auto; }
.page { display: none; }
.page.active { display: block; }

/* DASHBOARD */
.chart-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
.performance-chart { display: flex; align-items: flex-end; justify-content: space-around; height: 180px; padding-top: 30px; }
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.bar { width: 45px; border-radius: 4px 4px 0 0; transition: height 0.6s ease-out; position: relative; }
.bar-val { position: absolute; top: -22px; font-size: 12px; font-weight: 700; width: 100%; text-align: center; }
.bar-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 2rem; }
.stat-card { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }

/* INVENTORY TABLE */
.table-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }

/* IMAGE STYLING */
.prod-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: #0f172a; border: 1px solid var(--border); }

/* MULTI-IMAGE PREVIEW */
.gallery-wrapper { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--border); }
.gallery-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.thumb-box { 
    position: relative; width: 60px; height: 60px; cursor: pointer; 
    border-radius: 6px; overflow: hidden; border: 2px solid transparent; 
}
.thumb-box.selected { border-color: var(--accent-orange); box-shadow: 0 0 10px rgba(249, 115, 22, 0.4); }
.thumb-box img { width: 100%; height: 100%; object-fit: cover; }
.thumb-box::after { content: 'COVER'; position: absolute; bottom: 0; width: 100%; background: var(--accent-orange); color: white; font-size: 8px; text-align: center; font-weight: 800; opacity: 0; }
.thumb-box.selected::after { opacity: 1; }

/* FORMS */
.add-form { background: rgba(255,255,255,0.02); border: 1px dashed var(--accent-orange); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: none; }
.add-form.open { display: block; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr 0.8fr 0.8fr 1.5fr auto; gap: 12px; align-items: end; }
.form-grid input, .form-grid select { background: #0f172a; border: 1px solid var(--border); padding: 10px; color: white; border-radius: 6px; width: 100%; font-size: 12px; }

.badge-low { background: rgba(239, 68, 68, 0.15); color: var(--danger); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.btn-remove { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 5px; }
.btn-edit { background: none; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.btn-edit:hover { border-color: white; color: white; }

/* CATEGORY MANAGEMENT */
.cat-management { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
.cat-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.cat-tag { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
.cat-tag button { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; font-weight: 800; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-header">ONYX // AMBER</div>
    <div class="form-group"><label>User Identifier</label><input id="inp-user" type="text" value="admin"></div>
    <div class="form-group"><label>Security Key</label><input id="inp-pass" type="password" value="123"></div>
    <button class="btn-primary" onclick="doLogin()">AUTHENTICATE</button>
  </div>
</div>

<div id="app">
  <nav class="sidebar">
    <div class="sidebar-header">ONYX // AMBER</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)">DASHBOARD</div>
    <div class="nav-item" onclick="showPage('catalog',this)">INVENTORY</div>
    <div class="nav-item" onclick="showPage('categories',this)">CATEGORIES</div>
    <div style="margin-top: auto;"><button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--text-muted); width:100%; padding:10px; border-radius:6px; cursor:pointer; font-size:11px">TERMINATE SESSION</button></div>
  </nav>

  <main class="main-content">
    <div id="page-dashboard" class="page active">
        <h1 style="margin-bottom: 1.5rem">System Overview</h1>
        <div class="chart-container">
            <div style="font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 1rem;">DAILY PERFORMANCE RATIO</div>
            <div class="performance-chart" id="perf-chart"></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div style="color: var(--text-muted); font-size: 10px; font-weight: 700">TOTAL ORDERS</div><div style="font-size: 24px; font-weight: 700; margin-top: 5px">147</div></div>
            <div class="stat-card"><div style="color: var(--text-muted); font-size: 10px; font-weight: 700">NET REVENUE</div><div style="font-size: 24px; font-weight: 700; margin-top: 5px; color: var(--success)">2,481 DH</div></div>
            <div class="stat-card"><div style="color: var(--text-muted); font-size: 10px; font-weight: 700">ACTIVE CUSTOMERS</div><div style="font-size: 24px; font-weight: 700; margin-top: 5px">112</div></div>
            <div class="stat-card"><div style="color: var(--text-muted); font-size: 10px; font-weight: 700">LOW STOCK ITEMS</div><div id="low-stock-count" style="font-size: 24px; font-weight: 700; margin-top: 5px; color: var(--danger)">0</div></div>
        </div>
    </div>

    <div id="page-catalog" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem">
            <h1>Inventory Management</h1>
            <button class="btn-primary" style="width: auto; padding: 10px 20px" onclick="toggleForm()">+ NEW PRODUCT</button>
        </div>

        <div class="add-form" id="add-form">
            <div class="form-grid">
                <input type="hidden" id="f-id">
                <div><label style="font-size:10px; color:var(--text-muted)">NAME</label><input id="f-name" type="text"></div>
                <div><label style="font-size:10px; color:var(--text-muted)">CATEGORY</label><select id="f-cat"></select></div>
                <div><label style="font-size:10px; color:var(--text-muted)">PRICE (DH)</label><input id="f-price" type="number" step="0.01"></div>
                <div><label style="font-size:10px; color:var(--text-muted)">STOCK</label><input id="f-stock" type="number"></div>
                <div><label style="font-size:10px; color:var(--text-muted)">ADD IMAGES</label><input id="f-img" type="file" multiple accept="image/*" onchange="handleImageUpload(event)" style="padding: 6px;"></div>
                <button class="btn-primary" id="btn-save" onclick="saveProduct()" style="padding: 10px 20px">SAVE</button>
            </div>
            
            <div class="gallery-wrapper" id="gallery-wrapper" style="display:none">
                <p style="font-size: 10px; color: var(--text-muted); margin-bottom: 5px;">CLICK A PHOTO TO SET AS COVER:</p>
                <div class="gallery-preview" id="gallery-preview"></div>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead><tr><th>Cover</th><th>Product</th><th>Category</th><th>Price</th><th>Stock Status</th><th>Action</th></tr></thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>
    </div>

    <div id="page-categories" class="page">
        <h1>Category Management</h1>
        <div class="cat-management">
            <div style="display: flex; gap: 10px; align-items: end;">
                <div style="flex: 1;"><label style="font-size:10px; color:var(--text-muted); display: block; margin-bottom: 5px;">NEW CATEGORY NAME</label><input id="new-cat-name" type="text" style="width:100%; background: #0f172a; border: 1px solid var(--border); padding: 10px; color: white; border-radius: 6px;"></div>
                <button class="btn-primary" style="width: auto; padding: 10px 20px" onclick="addCategory()">ADD</button>
            </div>
            <div class="cat-list" id="cat-list"></div>
        </div>
    </div>
  </main>
</div>

<script>
const CREDS = {user:'admin', pass:'123'};
const STORAGE_KEY = 'onyx_amber_data';

// LOAD DATA
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    products: [
        {id: 1, name:'Classic T-Shirt', cat:'Apparel', price:149.00, stock: 45, images: [], mainImg: ''},
        {id: 2, name:'Ceramic Mug', cat:'Homeware', price:99.00, stock: 4, images: [], mainImg: ''}
    ],
    categories: ['Apparel', 'Homeware', 'Print']
};

let products = data.products;
let categories = data.categories;
let currentImages = [];
let selectedMainIndex = 0;

function doLogin(){
  if(document.getElementById('inp-user').value === CREDS.user && document.getElementById('inp-pass').value === CREDS.pass){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    updateUI();
  }
}

function updateUI() {
    renderDashboard();
    renderProducts();
    renderCategoryList();
    populateCategorySelect();
    document.getElementById('low-stock-count').innerText = products.filter(p => p.stock < 10).length;
    localStorage.setItem(STORAGE_KEY, JSON.stringify({products, categories}));
}

function showPage(id, el){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    el.classList.add('active');
}

function toggleForm() { 
    const form = document.getElementById('add-form');
    form.classList.toggle('open'); 
    if(!form.classList.contains('open')) clearForm();
}

function clearForm() {
    document.getElementById('f-id').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-stock').value = '';
    document.getElementById('f-img').value = '';
    document.getElementById('gallery-wrapper').style.display = 'none';
    document.getElementById('gallery-preview').innerHTML = '';
    document.getElementById('btn-save').innerText = 'SAVE';
    currentImages = [];
    selectedMainIndex = 0;
}

function handleImageUpload(event) {
    const files = event.target.files;
    if (files.length === 0) return;
    document.getElementById('gallery-wrapper').style.display = 'block';
    Array.from(files).forEach((file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImages.push(e.target.result);
            renderGallery();
        };
        reader.readAsDataURL(file);
    });
    event.target.value = '';
}

function renderGallery() {
    const previewContainer = document.getElementById('gallery-preview');
    previewContainer.innerHTML = currentImages.map((img, index) => `
        <div class="thumb-box ${index === selectedMainIndex ? 'selected' : ''}" onclick="selectCover(${index})">
            <img src="${img}">
        </div>
    `).join('');
}

function selectCover(index) {
    selectedMainIndex = index;
    renderGallery();
}

function renderDashboard(){
    const el = document.getElementById('perf-chart');
    const chartData = [{label:'Orders',val:147,color:'var(--accent-orange)'},{label:'Delivered',val:89,color:'var(--success)'},{label:'Transit',val:43,color:'#3b82f6'},{label:'Returns',val:15,color:'var(--danger)'}];
    const max = Math.max(...chartData.map(d => d.val));
    el.innerHTML = chartData.map(d => `<div class="bar-wrap"><div class="bar" style="height:${Math.round((d.val/max)*140)}px;background:${d.color}"><div class="bar-val">${d.val}</div></div><div class="bar-lbl">${d.label}</div></div>`).join('');
}

function renderProducts(){
    const tbody = document.getElementById('product-list');
    tbody.innerHTML = products.map(p => `
        <tr>
            <td><img src="${p.mainImg || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='}" class="prod-img"></td>
            <td style="font-weight: 600">${p.name} <br><small style="color:var(--text-muted); font-weight:400">${p.images.length} photos</small></td>
            <td><span style="background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:4px; font-size:12px">${p.cat}</span></td>
            <td style="color:var(--accent-orange); font-weight:700">${parseFloat(p.price).toFixed(2)} DH</td>
            <td>${p.stock < 10 ? `<span class="badge-low">LOW: ${p.stock}</span>` : `<span style="color:var(--text-muted)">${p.stock} Units</span>`}</td>
            <td>
                <button class="btn-edit" onclick="editProduct(${p.id})">EDIT</button>
                <button class="btn-remove" id="del-${p.id}" onclick="confirmDelete(${p.id})">REMOVE</button>
            </td>
        </tr>
    `).join('');
}

// DELETE CONFIRMATION LOGIC
function confirmDelete(id) {
    const btn = document.getElementById(`del-${id}`);
    if (btn.innerText === 'REMOVE') {
        btn.innerText = 'ARE YOU SURE?';
        btn.style.backgroundColor = 'var(--danger)';
        btn.style.color = 'white';
        // Reset after 3 seconds if not clicked
        setTimeout(() => {
            if (document.getElementById(`del-${id}`)) {
                btn.innerText = 'REMOVE';
                btn.style.backgroundColor = 'transparent';
                btn.style.color = 'var(--danger)';
            }
        }, 3000);
    } else {
        deleteProduct(id);
    }
}

function deleteProduct(id){
    products = products.filter(p => p.id !== id);
    updateUI();
}

function editProduct(id) {
    const p = products.find(x => x.id === id);
    if(p) {
        document.getElementById('f-id').value = p.id;
        document.getElementById('f-name').value = p.name;
        document.getElementById('f-cat').value = p.cat;
        document.getElementById('f-price').value = p.price;
        document.getElementById('f-stock').value = p.stock;
        document.getElementById('btn-save').innerText = 'UPDATE';
        currentImages = [...p.images];
        selectedMainIndex = currentImages.indexOf(p.mainImg);
        if (selectedMainIndex === -1) selectedMainIndex = 0;
        document.getElementById('gallery-wrapper').style.display = currentImages.length > 0 ? 'block' : 'none';
        renderGallery();
        document.getElementById('add-form').classList.add('open');
    }
}

function saveProduct(){
    const id = document.getElementById('f-id').value;
    const name = document.getElementById('f-name').value;
    const price = document.getElementById('f-price').value;
    const stock = document.getElementById('f-stock').value;
    const cat = document.getElementById('f-cat').value;
    if(name && price && stock) {
        const mainImg = currentImages[selectedMainIndex] || (currentImages.length > 0 ? currentImages[0] : '');
        if(id) {
            const p = products.find(x => x.id == id);
            p.name = name; p.price = price; p.stock = parseInt(stock); p.cat = cat; p.images = [...currentImages]; p.mainImg = mainImg;
        } else {
            products.push({ id: Date.now(), name, price, stock: parseInt(stock), cat, images: [...currentImages], mainImg });
        }
        updateUI(); toggleForm(); clearForm();
    }
}

// CATEGORY MANAGEMENT LOGIC
function renderCategoryList() {
    const el = document.getElementById('cat-list');
    el.innerHTML = categories.map((c, i) => `
        <div class="cat-tag">${c} <button onclick="deleteCategory(${i})">&times;</button></div>
    `).join('');
}

function populateCategorySelect() {
    const select = document.getElementById('f-cat');
    select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
}

function addCategory() {
    const name = document.getElementById('new-cat-name').value.trim();
    if (name && !categories.includes(name)) {
        categories.push(name);
        document.getElementById('new-cat-name').value = '';
        updateUI();
    }
}

function deleteCategory(index) {
    categories.splice(index, 1);
    updateUI();
}

updateUI();
</script>
</body>
</html>
